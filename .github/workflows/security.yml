name: Security checks

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "23 9 * * 1"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm test
      - name: Check JavaScript syntax
        run: find . -path ./node_modules -prune -o -name '*.js' -print0 | xargs -0 -n1 node --check
